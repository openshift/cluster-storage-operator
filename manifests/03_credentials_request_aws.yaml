# !!! CAUTION !!!
# When editing this file, please folow ROSA update process described here:
# https://source.redhat.com/departments/products_and_global_engineering/sre/wiki/aws_managed_policy_requirements_process_for_rosa_hcp
# After approval from ROSA, the updated role needs to be reflected also in:
# https://github.com/openshift/hypershift/blob/5e182bedfbda84fc65f5b6d41640d55b2ed1d33b/cmd/infra/aws/iam.go#L96

apiVersion: cloudcredential.openshift.io/v1
kind: CredentialsRequest
metadata:
  name: aws-ebs-csi-driver-operator
  namespace: openshift-cloud-credential-operator
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    capability.openshift.io/name: Storage+CloudCredential
spec:
  serviceAccountNames:
  - aws-ebs-csi-driver-operator
  - aws-ebs-csi-driver-controller-sa
  secretRef:
    name: ebs-cloud-credentials
    namespace: openshift-cluster-csi-drivers
  providerSpec:
    apiVersion: cloudcredential.openshift.io/v1
    kind: AWSProviderSpec
    statementEntries:
    - effect: Allow
      action:
      - ec2:AttachVolume
      - ec2:CreateSnapshot
      - ec2:CreateTags
      - ec2:CreateVolume
      - ec2:DeleteSnapshot
      - ec2:DeleteTags
      - ec2:DeleteVolume
      - ec2:DescribeInstances
      - ec2:DescribeSnapshots
      - ec2:DescribeTags
      - ec2:DescribeVolumes
      - ec2:DescribeVolumesModifications
      - ec2:DetachVolume
      - ec2:ModifyVolume
      - ec2:DescribeAvailabilityZones
      - ec2:EnableFastSnapshotRestores
      resource: "*"
    - effect: Allow
      action:
      - 'kms:ReEncrypt*'
      - kms:Decrypt
      - kms:Encrypt
      - kms:GenerateDataKey
      - kms:GenerateDataKeyWithoutPlainText
      - kms:DescribeKey
      resource: '*'
    - effect: Allow
      action:
      - kms:RevokeGrant
      - kms:CreateGrant
      - kms:ListGrants
      resource: '*'
      policyCondition:
        "Bool":
          "kms:GrantIsForAWSResource": true
