# !!! CAUTION !!!
# When editing this file, please folow ROSA update process described here:
# https://source.redhat.com/departments/products_and_global_engineering/sre/wiki/aws_managed_policy_requirements_process_for_rosa_hcp
# After approval from ROSA, the updated role needs to be reflected also in:
# https://github.com/openshift/hypershift/blob/5e182bedfbda84fc65f5b6d41640d55b2ed1d33b/cmd/infra/aws/iam.go#L96

apiVersion: cloudcredential.openshift.io/v1
kind: CredentialsRequest
metadata:
  name: aws-ebs-csi-driver-operator
  namespace: openshift-cloud-credential-operator
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    capability.openshift.io/name: Storage+CloudCredential
spec:
  serviceAccountNames:
  - aws-ebs-csi-driver-operator
  - aws-ebs-csi-driver-controller-sa
  secretRef:
    name: ebs-cloud-credentials
    namespace: openshift-cluster-csi-drivers
  providerSpec:
    apiVersion: cloudcredential.openshift.io/v1
    kind: AWSProviderSpec
    statementEntries:
    - effect: Allow
      action:
      - ec2:DescribeAvailabilityZones
      - ec2:DescribeInstances
      - ec2:DescribeInstanceTypes
      - ec2:DescribeSnapshots
      - ec2:DescribeVolumes
      - ec2:DescribeVolumesModifications
      - ec2:DescribeVolumeStatus
      resource: "*"
    - effect: Allow
      action:
      - ec2:CreateVolume
      - ec2:CopyVolumes
      resource: "arn:aws:ec2:*:*:volume/*"
      policyCondition:
        StringEquals:
          "aws:RequestTag/ebs.csi.aws.com/cluster": "true"
    - effect: Allow
      action:
      - ec2:CopyVolumes
      resource: "arn:aws:ec2:*:*:volume/vol-*"
      policyCondition:
        StringEquals:
          "ec2:ResourceTag/ebs.csi.aws.com/cluster": "true"
    - effect: Allow
      action:
      - ec2:CopyVolumes
      resource: "arn:aws:ec2:*:*:volume/vol-*"
      policyCondition:
        StringLike:
          "ec2:ResourceTag/kubernetes.io/created-for/pvc/name": "*"
    - effect: Allow
      action:
      - ec2:CreateSnapshot
      resource: "arn:aws:ec2:*:*:snapshot/*"
      policyCondition:
        StringEquals:
          "aws:RequestTag/ebs.csi.aws.com/cluster": "true"
    - effect: Allow
      action:
      - ec2:CreateSnapshot
      resource: "arn:aws:ec2:*:*:volume/*"
      policyCondition:
        StringEquals:
          "ec2:ResourceTag/ebs.csi.aws.com/cluster": "true"
    - effect: Allow
      action:
      - ec2:ModifyVolume
      - ec2:AttachVolume
      - ec2:DetachVolume
      - ec2:DeleteVolume
      resource: "arn:aws:ec2:*:*:volume/*"
      policyCondition:
        StringEquals:
          "ec2:ResourceTag/ebs.csi.aws.com/cluster": "true"
    - effect: Allow
      action:
      - ec2:ModifyVolume
      - ec2:AttachVolume
      - ec2:DetachVolume
      - ec2:DeleteVolume
      resource: "arn:aws:ec2:*:*:volume/*"
      policyCondition:
        StringLike:
          "ec2:ResourceTag/kubernetes.io/created-for/pvc/name": "*"
    - effect: Allow
      action:
      - ec2:CreateVolume
      - ec2:EnableFastSnapshotRestores
      resource: "arn:aws:ec2:*:*:snapshot/*"
      policyCondition:
        StringEquals:
          "ec2:ResourceTag/ebs.csi.aws.com/cluster": "true"
    - effect: Allow
      action:
      - ec2:AttachVolume
      - ec2:DetachVolume
      resource: "arn:aws:ec2:*:*:instance/*"
    - effect: Allow
      action:
      - ec2:DeleteSnapshot
      - ec2:LockSnapshot
      resource: "arn:aws:ec2:*:*:snapshot/*"
      policyCondition:
        StringEquals:
          "ec2:ResourceTag/ebs.csi.aws.com/cluster": "true"
    - effect: Allow
      action:
      - ec2:CreateTags
      resource: "arn:aws:ec2:*:*:volume/*"
      policyCondition:
        StringEquals:
          "ec2:CreateAction":
            - CreateVolume
            - CreateSnapshot
            - CopyVolumes
    - effect: Allow
      action:
      - ec2:CreateTags
      resource: "arn:aws:ec2:*:*:snapshot/*"
      policyCondition:
        StringEquals:
          "ec2:CreateAction":
            - CreateVolume
            - CreateSnapshot
            - CopyVolumes
    - effect: Allow
      action:
      - ec2:CreateTags
      - ec2:DeleteTags
      resource: "arn:aws:ec2:*:*:volume/*"
      policyCondition:
        StringEquals:
          "ec2:ResourceTag/ebs.csi.aws.com/cluster": "true"
        "ForAllValues:StringNotEquals":
          "aws:TagKeys":
            - "ebs.csi.aws.com/cluster"
            - "ebs.csi.aws.com/cluster-name"
            - "kubernetes.io/created-for/pvc/name"
    - effect: Allow
      action:
      - kms:Decrypt
      - kms:GenerateDataKeyWithoutPlaintext
      resource: "arn:aws:kms:*:*:key/*"
    - effect: Allow
      action:
      - kms:CreateGrant
      resource: "arn:aws:kms:*:*:key/*"
      policyCondition:
        Bool:
          "kms:GrantIsForAWSResource": true
