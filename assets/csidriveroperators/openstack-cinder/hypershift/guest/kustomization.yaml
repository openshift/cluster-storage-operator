resources:
  - ../../base
namespace: openshift-cluster-csi-drivers
patches:
  # TODO(stephenfin): Other operators patch in access to persistentclaimvolumes here,
  # but we allow that in our base asset (meaning, in both a standalone and a HCP
  # guest cluster). Why the distinction? Should we be stricter?
  - path: monitoring_role.patch.yaml
    target:
      kind: Role
      version: v1
  # The deployment runs in the management cluster, not here in the guest
  # cluster. Remove it.
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openstack-cinder-csi-driver-operator
        namespace: openshift-cluster-csi-drivers
